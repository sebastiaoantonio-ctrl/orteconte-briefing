<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Orteconte</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">
  <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-4 p-2 border rounded-lg">

  <input id="senha" type="password" placeholder="Senha"
    class="w-full mb-4 p-2 border rounded-lg">

  <button onclick="login()"
    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
    Entrar
  </button>

  <p id="msg" class="mt-4 text-red-500 text-center"></p>
</div>

<script src="js/config.js"></script>

<script>
async function login() {

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const response = await fetch(`${SUPABASE_URL}/rest/v1/usuarios?email=eq.${email}&senha=eq.${senha}`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await response.json();

  if (data.length > 0) {
    localStorage.setItem("usuario", JSON.stringify(data[0]));
    window.location.href = "painel.html"; // 🔥 CORREÇÃO AQUI
  } else {
    document.getElementById("msg").innerText = "Email ou senha inválidos.";
  }
}
</script>

</body>
</html>
