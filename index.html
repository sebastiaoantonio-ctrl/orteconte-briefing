<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Orteconte Briefing - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-700">
      Orteconte Briefing
    </h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full mb-4 p-2 border rounded-lg">

    <input id="senha" type="password" placeholder="Senha"
      class="w-full mb-4 p-2 border rounded-lg">

    <button onclick="login()"
      class="w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">
      Entrar
    </button>

    <p id="erro" class="text-red-500 mt-4 text-sm text-center"></p>
  </div>

<script src="js/config.js"></script>
<script src="js/login.js"></script>
</body>
</html>
