<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Abertura de Empresa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3"><a href="dashboard.html">Dashboard</a></li>
      <li class="mb-3 font-bold">Novo Briefing</li>
      <li class="mb-3"><a href="historico.html">Histórico</a></li>
    </ul>
  </div>

  <div class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-8">BRIEFING SOCIETÁRIO - ABERTURA</h1>

    <form class="space-y-10">

      <!-- ================= DADOS INICIAIS ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-6">Dados Iniciais</h2>

        <div class="grid grid-cols-2 gap-6">

          <div>
            <label class="block font-semibold mb-1">Cliente *</label>
            <input required class="border p-2 rounded w-full">
          </div>

          <div>
            <label class="block font-semibold mb-1">Valor *</label>
            <input required class="border p-2 rounded w-full">
          </div>

          <div>
            <label class="block font-semibold mb-1">Forma de Pagamento *</label>
            <select id="formaPagamento" required
              onchange="verificarPagamento()"
              class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Pix</option>
              <option>Deposito Bancário</option>
              <option>Boleto</option>
            </select>
          </div>

          <div id="campoVencimento" style="display:none;">
            <label class="block font-semibold mb-1">Vencimento *</label>
            <input id="vencimento"
              type="date"
              class="border p-2 rounded w-full">
          </div>

        </div>
      </div>

    <!-- ================= DADOS DA EMPRESA ================= -->
<div class="bg-white p-6 rounded-xl shadow">
  <h2 class="text-xl font-bold mb-6">Dados da Empresa</h2>

  <div class="grid grid-cols-2 gap-6">

    <!-- Razão Social -->
    <div>
      <label class="block font-semibold mb-1">Razão Social *</label>
      <input required class="border p-2 rounded w-full">
    </div>

    <!-- Grupo -->
    <div>
      <label class="block font-semibold mb-1">Grupo</label>
      <input class="border p-2 rounded w-full">
    </div>

    <!-- Nome Fantasia -->
    <div>
      <label class="block font-semibold mb-1">Nome Fantasia *</label>
      <input required class="border p-2 rounded w-full">
    </div>

    <!-- Enquadramento -->
    <div>
      <label class="block font-semibold mb-1">Enquadramento *</label>
      <select required class="border p-2 rounded w-full">
        <option value="">Selecione</option>
        <option>MEI</option>
        <option>ME</option>
        <option>EPP</option>
        <option>DEMAIS</option>
      </select>
    </div>

    <!-- Natureza Jurídica -->
    <div>
      <label class="block font-semibold mb-1">Natureza Jurídica *</label>
      <select id="naturezaJuridica"
              required
              onchange="toggleAdvogado()"
              class="border p-2 rounded w-full">
        <option value="">Selecione</option>
        <option>Sociedade Limitada (LTDA)</option>
        <option>Sociedade Limitada Unipessoal (SLU)</option>
        <option>Microempreendedor Individual (MEI)</option>
        <option>Sociedade Anônima (S/A)</option>
      </select>
    </div>

    <!-- Regime Tributário -->
    <div>
      <label class="block font-semibold mb-1">Regime Tributário *</label>
      <select required class="border p-2 rounded w-full">
        <option value="">Selecione</option>
        <option>Simples Nacional</option>
        <option>Lucro Presumido</option>
        <option>Lucro Real</option>
        <option>Isento</option>
      </select>
    </div>

  </div>

  <!-- FORMA DE ATUAÇÃO -->
  <h3 class="font-semibold mt-8 mb-3">Forma de Atuação *</h3>

  <div class="grid grid-cols-3 gap-3 text-sm">
    <label><input type="checkbox"> Estabelecimento Fixo</label>
    <label><input type="checkbox"> Televendas</label>
    <label><input type="checkbox"> Local Fixo Fora da Loja</label>
    <label><input type="checkbox"> Internet</label>
    <label><input type="checkbox"> Correios</label>
    <label><input type="checkbox"> Porta a Porta / Postos Móveis</label>
    <label><input type="checkbox"> Máquinas Automáticas</label>
    <label><input type="checkbox"> Atividades Fora do Estabelecimento</label>
  </div>

  <!-- Alvará e Licitações -->
  <div class="grid grid-cols-2 gap-6 mt-6">

    <div>
      <label class="block font-semibold mb-1">Alvará *</label>
      <select required class="border p-2 rounded w-full">
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>
    </div>

    <div>
      <label class="block font-semibold mb-1">Licitações *</label>
      <select required class="border p-2 rounded w-full">
        <option value="">Selecione</option>
        <option>Sim</option>
        <option>Não</option>
      </select>
    </div>

  </div>

  <!-- Endereço -->
  <div class="mt-6">
    <label class="block font-semibold mb-1">Endereço Completo *</label>
    <input required class="border p-2 rounded w-full">
  </div>

  <!-- Atividades -->
  <div class="mt-6">
    <label class="block font-semibold mb-1">Atividades Desenvolvidas *</label>
    <textarea required class="border p-2 rounded w-full"></textarea>
  </div>

  <!-- CNAEs -->
  <div class="grid grid-cols-2 gap-6 mt-6">

    <div>
      <label class="block font-semibold mb-1">CNAE Principal *</label>
      <input required class="border p-2 rounded w-full">
    </div>

    <div>
      <label class="block font-semibold mb-1">CNAEs Secundários</label>
      <input class="border p-2 rounded w-full">
    </div>

  </div>

  <!-- Contato -->
  <div class="grid grid-cols-3 gap-6 mt-6">

    <div>
      <label class="block font-semibold mb-1">Responsável RFB *</label>
      <input required class="border p-2 rounded w-full">
    </div>

    <div>
      <label class="block font-semibold mb-1">Telefone *</label>
      <input required class="border p-2 rounded w-full">
    </div>

    <div>
      <label class="block font-semibold mb-1">E-mail *</label>
      <input required class="border p-2 rounded w-full">
    </div>

  </div>

  <!-- Financeiro -->
  <div class="grid grid-cols-3 gap-6 mt-6">

    <div>
      <label class="block font-semibold mb-1">Honorário *</label>
      <input required oninput="formatarMoeda(this)"
        class="border p-2 rounded w-full">
    </div>

    <div>
      <label class="block font-semibold mb-1">Vencimento *</label>
      <select required class="border p-2 rounded w-full">
        <option value="">Selecione</option>
        <option>06</option>
        <option>10</option>
        <option>20</option>
      </select>
    </div>

    <div>
      <label class="block font-semibold mb-1">Usuário Externo *</label>
      <input required class="border p-2 rounded w-full">
    </div>

  </div>

</div>

    <!-- BLOCO ADVOGADO (CONDICIONAL) -->
    <div id="blocoAdvogado" class="col-span-2 grid grid-cols-3 gap-4" style="display:none;">

      <div>
        <label class="block font-semibold mb-1">Advogado *</label>
        <input id="advogado" class="border p-2 rounded w-full">
      </div>

      <div>
        <label class="block font-semibold mb-1">CPF Advogado *</label>
        <input id="cpfAdvogado" class="border p-2 rounded w-full">
      </div>

      <div>
        <label class="block font-semibold mb-1">OAB *</label>
        <input id="oab" class="border p-2 rounded w-full">
      </div>

    </div>

  </div>
</div>

      <!-- ================= DADOS DOS SÓCIOS ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados dos Sócios</h2>

        <div id="sociosContainer"></div>

        <button type="button"
          onclick="adicionarSocio()"
          class="bg-blue-600 text-white px-4 py-2 rounded mt-4">
          + Adicionar Sócio
        </button>
      </div>

      <!-- ================= CHECKLIST ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Checklist de Documentos</h2>

        <div class="space-y-2">
          <label><input type="checkbox"> CNH dos Sócios</label><br>
          <label><input type="checkbox"> IPTU do Imóvel</label><br>
          <label><input type="checkbox"> Contrato de Locação</label><br>
          <label><input type="checkbox"> Certificado Digital</label>
        </div>

        <textarea placeholder="Observações"
          class="border p-2 rounded w-full mt-4"></textarea>
      </div>

      <button type="submit"
        class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
        Salvar Briefing
      </button>

    </form>
  </div>

</div>

<script>
function verificarPagamento() {
  const forma = document.getElementById("formaPagamento").value;
  const campo = document.getElementById("campoVencimento");
  const vencimento = document.getElementById("vencimento");

  if (forma === "Boleto") {
    campo.style.display = "block";
    vencimento.required = true;
  } else {
    campo.style.display = "none";
    vencimento.required = false;
    vencimento.value = "";
  }
}

let contadorSocios = 0;

function formatarMoeda(campo) {
  let valor = campo.value.replace(/\D/g, "");
  valor = (valor / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  campo.value = "R$ " + valor;
}

function adicionarSocio() {

  contadorSocios++;
  const id = contadorSocios;
  const container = document.getElementById("sociosContainer");

  container.innerHTML += `
    <div class="border p-4 rounded-lg mb-4 bg-gray-50">
      <h3 class="font-semibold mb-3 text-blue-800">Sócio ${id}</h3>

      <div class="grid grid-cols-2 gap-4">

        <input placeholder="Nome" class="border p-2 rounded">
        <input placeholder="Quotas (R$)" class="border p-2 rounded">
        <input placeholder="Endereço" class="border p-2 rounded">
        <input placeholder="Status" class="border p-2 rounded">
        <input placeholder="Estado Civil" class="border p-2 rounded">
        <input placeholder="Profissão" class="border p-2 rounded">
        <input placeholder="Telefone" class="border p-2 rounded">
        <input placeholder="E-mail" class="border p-2 rounded">

        <!-- Responsável RFB -->
        <div>
          <label class="block text-sm font-semibold">Responsável RFB</label>
          <select class="border p-2 rounded w-full">
            <option value="">Selecione</option>
            <option>Sim</option>
            <option>Não</option>
          </select>
        </div>

        <!-- Administrador -->
        <div>
          <label class="block text-sm font-semibold">Administrador</label>
          <select class="border p-2 rounded w-full">
            <option value="">Selecione</option>
            <option>Sim</option>
            <option>Não</option>
          </select>
        </div>

        <!-- Pró-labore -->
        <div>
          <label class="block text-sm font-semibold">Pró-labore</label>
          <select onchange="toggleProlabore(${id}, this.value)"
            class="border p-2 rounded w-full">
            <option value="">Selecione</option>
            <option>Sim</option>
            <option>Não</option>
          </select>
        </div>

        <!-- Valor Pró-labore -->
        <div id="valorProlabore${id}" style="display:none;">
          <label class="block text-sm font-semibold">Valor Pró-labore</label>
          <input oninput="formatarMoeda(this)"
            class="border p-2 rounded w-full">
        </div>

        <!-- Certificado Digital -->
        <div>
          <label class="block text-sm font-semibold">Certificado Digital</label>
          <select class="border p-2 rounded w-full">
            <option value="">Selecione</option>
            <option>Sim</option>
            <option>Não</option>
          </select>
        </div>

        <!-- Acesso Gov.br -->
        <div>
          <label class="block text-sm font-semibold">Acesso Gov.br</label>
          <select onchange="toggleGov(${id}, this.value)"
            class="border p-2 rounded w-full">
            <option value="">Selecione</option>
            <option>Sim</option>
            <option>Não</option>
          </select>
        </div>

        <!-- Senha Gov -->
        <div id="senhaGov${id}" style="display:none;">
          <label class="block text-sm font-semibold">Senha Gov.br</label>
          <input class="border p-2 rounded w-full">
        </div>

      </div>
    </div>
  `;
}

function toggleProlabore(id, valor) {
  const campo = document.getElementById("valorProlabore" + id);
  campo.style.display = valor === "Sim" ? "block" : "none";
}

function toggleGov(id, valor) {
  const campo = document.getElementById("senhaGov" + id);
  campo.style.display = valor === "Sim" ? "block" : "none";
}
function toggleAdvogado() {
  const natureza = document.getElementById("naturezaJuridica").value;
  const bloco = document.getElementById("blocoAdvogado");
  const advogado = document.getElementById("advogado");
  const cpf = document.getElementById("cpfAdvogado");
  const oab = document.getElementById("oab");

  if (natureza === "Sociedade Anônima (S/A)") {
    bloco.style.display = "grid";
    advogado.required = true;
    cpf.required = true;
    oab.required = true;
  } else {
    bloco.style.display = "none";
    advogado.required = false;
    cpf.required = false;
    oab.required = false;
  }
}
