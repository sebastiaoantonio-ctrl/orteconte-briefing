 <script>

 function verificarPagamento() {

   const vencimento = document.getElementById("vencimento");

 function formatarMoeda(campo) {
   let valor = campo.value.replace(/\D/g, "");
   valor = (valor / 100).toFixed(2) + "";
   valor = valor.replace(".", ",");
   valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
   campo.value = "R$ " + valor;
 }

+function validarFormulario(event) {
+  const formulario = document.querySelector("form");
+  const formaPagamento = document.getElementById("formaPagamento");
+  const vencimento = document.getElementById("vencimento");
+  const naturezaJuridica = document.getElementById("naturezaJuridica");
+  const advogado = document.getElementById("advogado");
+  const cpf = document.getElementById("cpfAdvogado");
+  const oab = document.getElementById("oab");
+
+  if (!formulario || !formaPagamento || !vencimento || !naturezaJuridica || !advogado || !cpf || !oab) {
+    return;
+  }
+
+  vencimento.setCustomValidity("");
+  advogado.setCustomValidity("");
+  cpf.setCustomValidity("");
+  oab.setCustomValidity("");
+
+  if (formaPagamento.value === "Boleto" && !vencimento.value) {
+    vencimento.setCustomValidity("Informe o vencimento para pagamento via boleto.");
+  }
+
+  if (naturezaJuridica.value === "Sociedade Anônima (S/A)") {
+    const cpfLimpo = cpf.value.replace(/\D/g, "");
+
+    if (!advogado.value.trim()) {
+      advogado.setCustomValidity("Informe o nome do advogado.");
+    }
+
+    if (cpfLimpo.length !== 11) {
+      cpf.setCustomValidity("Informe um CPF válido com 11 dígitos.");
+    }
+
+    if (!oab.value.trim()) {
+      oab.setCustomValidity("Informe o número da OAB.");
+    }
+  }
+
+  if (!formulario.checkValidity()) {
+    event.preventDefault();
+    formulario.reportValidity();
   }
 }
+
+function inicializarFormulario() {
+  const formulario = document.querySelector("form");
+  const botaoAdicionarSocio = document.getElementById("btnAdicionarSocio");
+  const formaPagamento = document.getElementById("formaPagamento");
+  const naturezaJuridica = document.getElementById("naturezaJuridica");
+
+  if (formulario) {

+  }
+
+  if (botaoAdicionarSocio) {
+    botaoAdicionarSocio.addEventListener("click", adicionarSocio);
+  }
+
+  if (formaPagamento) {
+    formaPagamento.addEventListener("change", verificarPagamento);
+  }
+
+  if (naturezaJuridica) {
+    naturezaJuridica.addEventListener("change", toggleAdvogado);
+  }
+
+  verificarPagamento();
+  toggleAdvogado();
+}
