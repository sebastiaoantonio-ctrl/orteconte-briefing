<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Abertura de Empresa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3"><a href="dashboard.html">Dashboard</a></li>
      <li class="mb-3 font-bold">Novo Briefing</li>
      <li class="mb-3"><a href="historico.html">Histórico</a></li>
    </ul>
  </div>

  <div class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-8">BRIEFING SOCIETÁRIO - ABERTURA</h1>

    <form class="space-y-10">

      <!-- ================= DADOS INICIAIS ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados Iniciais</h2>

        <div class="grid grid-cols-2 gap-4">
          <input placeholder="Tipo de Processo" class="border p-2 rounded">
          <input placeholder="Cliente" class="border p-2 rounded">
          <input placeholder="Valor" class="border p-2 rounded">
          <input placeholder="Forma de Pagamento" class="border p-2 rounded">
          <input placeholder="Caso Boleto - Vencimento" class="border p-2 rounded">
        </div>
      </div>

      <!-- ================= DADOS DA EMPRESA ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados da Empresa</h2>

        <div class="grid grid-cols-2 gap-4">

          <input placeholder="Razão Social" class="border p-2 rounded">
          <input placeholder="Grupo" class="border p-2 rounded">

          <input placeholder="Nome Fantasia" class="border p-2 rounded">
          <input placeholder="Enquadramento" class="border p-2 rounded">

          <input placeholder="Advogado" class="border p-2 rounded">
          <input placeholder="CPF Advogado" class="border p-2 rounded">
          <input placeholder="OAB" class="border p-2 rounded">

          <!-- Natureza Jurídica -->
          <select class="border p-2 rounded">
            <option>Natureza Jurídica</option>
            <option>Empresário Individual</option>
            <option>LTDA</option>
            <option>SLU</option>
            <option>EIRELI</option>
            <option>Sociedade Simples</option>
            <option>MEI</option>
          </select>

          <!-- Regime Tributário -->
          <select class="border p-2 rounded">
            <option>Regime Tributário</option>
            <option>Simples Nacional</option>
            <option>Lucro Presumido</option>
            <option>Lucro Real</option>
            <option>Isento</option>
          </select>

        </div>

        <h3 class="font-semibold mt-6 mb-2">Forma de Atuação</h3>

        <div class="grid grid-cols-3 gap-2 text-sm">
          <label><input type="checkbox"> Estabelecimento Fixo</label>
          <label><input type="checkbox"> Televendas</label>
          <label><input type="checkbox"> Local Fixo Fora da Loja</label>
          <label><input type="checkbox"> Internet</label>
          <label><input type="checkbox"> Correios</label>
          <label><input type="checkbox"> Porta a Porta / Postos Móveis</label>
          <label><input type="checkbox"> Máquinas Automáticas</label>
          <label><input type="checkbox"> Atividades Fora do Estabelecimento</label>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6">
          <input placeholder="Alvará" class="border p-2 rounded">
          <input placeholder="Licitações" class="border p-2 rounded">
          <input placeholder="Endereço Completo" class="border p-2 rounded col-span-2">
        </div>

        <textarea placeholder="Atividades Desenvolvidas"
          class="border p-2 rounded w-full mt-4"></textarea>

        <div class="grid grid-cols-2 gap-4 mt-4">
          <input placeholder="CNAE Principal" class="border p-2 rounded">
          <input placeholder="CNAEs Secundários" class="border p-2 rounded">
        </div>

        <div class="grid grid-cols-3 gap-4 mt-4">
          <input placeholder="Responsável RFB" class="border p-2 rounded">
          <input placeholder="Telefone" class="border p-2 rounded">
          <input placeholder="E-mail" class="border p-2 rounded">
        </div>

        <div class="grid grid-cols-3 gap-4 mt-4">
          <input placeholder="Honorário" class="border p-2 rounded">
          <input placeholder="Vencimento" class="border p-2 rounded">
          <input placeholder="Usuário Externo" class="border p-2 rounded">
        </div>

      </div>

      <!-- ================= DADOS DOS SÓCIOS ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados dos Sócios</h2>

        <div id="sociosContainer"></div>

        <button type="button"
          onclick="adicionarSocio()"
          class="bg-blue-600 text-white px-4 py-2 rounded mt-4">
          + Adicionar Sócio
        </button>
      </div>

      <!-- ================= CHECKLIST ================= -->
      <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Checklist de Documentos</h2>

        <div class="space-y-2">
          <label><input type="checkbox"> CNH dos Sócios</label><br>
          <label><input type="checkbox"> IPTU do Imóvel</label><br>
          <label><input type="checkbox"> Contrato de Locação</label><br>
          <label><input type="checkbox"> Certificado Digital</label>
        </div>

        <textarea placeholder="Observações"
          class="border p-2 rounded w-full mt-4"></textarea>
      </div>

      <button type="submit"
        class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
        Salvar Briefing
      </button>

    </form>
  </div>

</div>

<script>
let contadorSocios = 0;

function formatarMoeda(campo) {
  let valor = campo.value.replace(/\D/g, "");
  valor = (valor / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  campo.value = "R$ " + valor;
}

function adicionarSocio() {

  contadorSocios++;

  const container = document.getElementById("sociosContainer");

  container.innerHTML += `
    <div class="border p-4 rounded-lg mb-4 bg-gray-50">
      <h3 class="font-semibold mb-3 text-blue-800">Sócio ${contadorSocios}</h3>

      <div class="grid grid-cols-2 gap-4">

        <input placeholder="Nome"
          class="border p-2 rounded">

        <input placeholder="Quotas (R$)"
          class="border p-2 rounded">

        <input placeholder="Endereço"
          class="border p-2 rounded">

        <input placeholder="Status"
          class="border p-2 rounded">

        <input placeholder="Estado Civil"
          class="border p-2 rounded">

        <input placeholder="Profissão"
          class="border p-2 rounded">

        <input placeholder="Telefone"
          class="border p-2 rounded">

        <input placeholder="E-mail"
          class="border p-2 rounded">

        <input placeholder="Responsável RFB"
          class="border p-2 rounded">

        <label class="flex items-center gap-2">
          <input type="checkbox">
          Administrador
        </label>

        <input placeholder="Pró-labore"
          class="border p-2 rounded">

        <input placeholder="Valor Pró-labore"
          oninput="formatarMoeda(this)"
          class="border p-2 rounded">

        <input placeholder="Certificado Digital"
          class="border p-2 rounded">

        <input placeholder="Acesso Gov.br"
          class="border p-2 rounded">

        <input placeholder="Senha Gov.br"
          class="border p-2 rounded">

      </div>
    </div>
  `;
}
</script>
