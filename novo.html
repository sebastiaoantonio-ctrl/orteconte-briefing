<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Novo Briefing</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3"><a href="dashboard.html">Dashboard</a></li>
      <li class="mb-3 font-bold">Novo Briefing</li>
      <li class="mb-3"><a href="historico.html">Histórico</a></li>
      <li class="mt-6"><button onclick="logout()" class="text-red-300">Sair</button></li>
    </ul>
  </div>

  <div class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-6">Novo Briefing</h1>

    <div class="bg-white p-6 rounded-xl shadow">

      <select id="tipo" class="w-full mb-4 p-2 border rounded-lg">
        <option value="">Selecione o tipo</option>
        <option>Abertura</option>
        <option>Alteração</option>
        <option>Baixa</option>
        <option>Portabilidade Entrada</option>
        <option>Portabilidade Saída</option>
        <option>Entrada Doméstica</option>
        <option>Produtor Rural</option>
      </select>

      <input id="empresa" placeholder="Empresa"
        class="w-full mb-4 p-2 border rounded-lg">

      <input id="cpf_cnpj" placeholder="CPF/CNPJ"
        class="w-full mb-4 p-2 border rounded-lg">

      <input id="grupo" placeholder="Grupo"
        class="w-full mb-4 p-2 border rounded-lg">

      <button onclick="salvarBriefing()"
        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
        Salvar
      </button>

      <p id="msg" class="mt-4 text-green-600"></p>

    </div>
  </div>

</div>

<script src="js/config.js"></script>

<script>
function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

async function salvarBriefing() {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  if (!usuario) {
    window.location.href = "index.html";
    return;
  }

  const tipo = document.getElementById("tipo").value;
  const empresa = document.getElementById("empresa").value;
  const cpf_cnpj = document.getElementById("cpf_cnpj").value;
  const grupo = document.getElementById("grupo").value;

  const response = await fetch(`${SUPABASE_URL}/rest/v1/briefings`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({
      tipo,
      empresa,
      cpf_cnpj,
      grupo,
      usuario_id: usuario.id,
      status: "Pendente",
      dados_json: {}
    })
  });

  if (response.ok) {
    document.getElementById("msg").innerText = "Briefing salvo com sucesso!";
  } else {
    document.getElementById("msg").innerText = "Erro ao salvar.";
  }
}
</script>

</body>
</html>
