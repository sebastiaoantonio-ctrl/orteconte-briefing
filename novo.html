<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Novo Briefing</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3"><a href="dashboard.html">Dashboard</a></li>
      <li class="mb-3 font-bold">Novo Briefing</li>
      <li class="mb-3"><a href="historico.html">Histórico</a></li>
    </ul>
  </div>

  <div class="flex-1 p-10">

    <h1 class="text-3xl font-bold mb-8">Selecionar Tipo de Briefing</h1>

    <div class="bg-white p-8 rounded-xl shadow max-w-lg">

      <select id="tipo"
        class="w-full border p-3 rounded-lg mb-6 text-lg">
        <option value="">Selecione o tipo</option>
        <option value="abertura">Abertura de Empresa</option>
        <option value="alteracao">Alteração de Empresa</option>
        <option value="baixa">Baixa de Empresa</option>
        <option value="portabilidade-entrada">Portabilidade Entrada</option>
        <option value="portabilidade-saida">Portabilidade Saída</option>
      </select>

      <button onclick="irParaFormulario()"
        class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 w-full">
        Continuar
      </button>

    </div>

  </div>

</div>

<script>
function irParaFormulario() {
  const tipo = document.getElementById("tipo").value;

  if (!tipo) {
    alert("Selecione um tipo de briefing.");
    return;
  }

  window.location.href = tipo + ".html";
}
</script>

</body>
</html>
