<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baixa de Empresa - Orteconte</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex min-h-screen">
  <aside class="w-64 bg-blue-900 text-white p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3"><a href="dashboard.html">Dashboard</a></li>
      <li class="mb-3 font-bold"><a href="novo.html">Novo Briefing</a></li>
      <li class="mb-3"><a href="historico.html">Histórico</a></li>
      <li class="mt-6"><button type="button" onclick="logout()" class="text-red-300">Sair</button></li>
    </ul>
  </aside>

  <main class="flex-1 p-6 md:p-10">
    <h1 class="text-3xl font-bold mb-8">BRIEFING SOCIETÁRIO - BAIXA</h1>

    <form id="formBaixa" class="space-y-8">
      <section class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados Iniciais</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block font-semibold mb-1">Tipo de Processo *</label>
            <input name="tipoProcesso" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Cliente *</label>
            <input name="cliente" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Valor *</label>
            <input name="valor" required oninput="formatarMoeda(this)" class="border p-2 rounded w-full" placeholder="R$ 0,00">
          </div>

          <div>
            <label class="block font-semibold mb-1">Forma de Pagamento *</label>
            <select id="formaPagamento" name="formaPagamento" required class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Pix</option>
              <option>Depósito</option>
              <option>Boleto</option>
            </select>
          </div>

          <div id="blocoVencimento" class="hidden md:col-span-2">
            <label class="block font-semibold mb-1">Caso Boleto Vencimento *</label>
            <input id="vencimentoBoleto" name="vencimentoBoleto" type="date" class="border p-2 rounded w-full" disabled>
          </div>
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados da Empresa</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="md:col-span-2">
            <label class="block font-semibold mb-1">Razão Social *</label>
            <input id="empresa" name="razaoSocial" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Grupo</label>
            <input id="grupo" name="grupo" class="border p-2 rounded w-full">
          </div>

          <div class="md:col-span-2">
            <label class="block font-semibold mb-1">Nome Fantasia *</label>
            <input name="nomeFantasia" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">CNPJ *</label>
            <input id="cpf_cnpj" name="cnpj" required class="border p-2 rounded w-full">
          </div>

          <div class="md:col-span-3">
            <label class="block font-semibold mb-1">Endereço Comercial *</label>
            <input name="enderecoComercial" required class="border p-2 rounded w-full">
          </div>

          <div class="md:col-span-2">
            <label class="block font-semibold mb-1">Responsável RFB *</label>
            <input name="responsavelRfb" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Telefone *</label>
            <input name="telefone" required class="border p-2 rounded w-full">
          </div>

          <div>
            <label class="block font-semibold mb-1">E-mail *</label>
            <input type="email" name="email" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Possui Filiais *</label>
            <select name="possuiFiliais" required class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Sim</option>
              <option>Não</option>
            </select>
          </div>
          <div>
            <label class="block font-semibold mb-1">Quanta(s)</label>
            <input name="quantidadeFiliais" class="border p-2 rounded w-full">
          </div>
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Dados para Baixa</h2>

        <div>
          <label class="block font-semibold mb-1">Declarações de nossa Responsabilidade *</label>
          <textarea name="declaracoesResponsabilidade" required class="border p-2 rounded w-full min-h-[100px]"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-4">
          <div>
            <label class="block font-semibold mb-1">Última Competência *</label>
            <input name="ultimaCompetencia" required class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Possui Bens Móveis ou Imóveis? *</label>
            <select name="possuiBens" required class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Sim</option>
              <option>Não</option>
            </select>
          </div>
          <div>
            <label class="block font-semibold mb-1">Quantos</label>
            <input name="quantidadeBens" class="border p-2 rounded w-full">
          </div>
          <div>
            <label class="block font-semibold mb-1">Possui Leasing? *</label>
            <select name="possuiLeasing" required class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Sim</option>
              <option>Não</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
          <div>
            <label class="block font-semibold mb-1">Possui Conta Bancária? *</label>
            <select name="possuiContaBancaria" required class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Sim</option>
              <option>Não</option>
            </select>
          </div>
          <div>
            <label class="block font-semibold mb-1">Possui Empréstimos ou Financiamentos? *</label>
            <select name="possuiEmprestimos" required class="border p-2 rounded w-full">
              <option value="">Selecione</option>
              <option>Sim</option>
              <option>Não</option>
            </select>
          </div>
        </div>
      </section>

      <section class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Coleta de Informações</h2>
        <label class="block font-semibold mb-1">Motivo da Baixa *</label>
        <textarea name="motivoBaixa" required class="border p-2 rounded w-full min-h-[120px]"></textarea>
      </section>

      <section class="bg-white p-6 rounded-xl shadow">
        <h2 class="text-xl font-bold mb-4">Observações</h2>
        <textarea name="observacoes" class="border p-2 rounded w-full min-h-[220px]"></textarea>
      </section>

      <div class="flex flex-wrap gap-3">
        <button type="reset" class="bg-gray-200 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-300">
          Limpar
        </button>
        <button type="submit" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
          Salvar Briefing
        </button>
      </div>

      <p id="msg" class="font-semibold"></p>
    </form>
  </main>
</div>

<script src="js/config.js"></script>
<script>
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario) window.location.href = "index.html";

function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

function formatarMoeda(campo) {
  let valor = campo.value.replace(/\D/g, "");
  if (!valor) {
    campo.value = "";
    return;
  }

  valor = (parseInt(valor, 10) / 100).toFixed(2) + "";
  valor = valor.replace(".", ",");
  valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  campo.value = "R$ " + valor;
}

function toggleVencimentoBoleto() {
  const formaPagamento = document.getElementById("formaPagamento");
  const bloco = document.getElementById("blocoVencimento");
  const input = document.getElementById("vencimentoBoleto");

  if (formaPagamento.value === "Boleto") {
    bloco.classList.remove("hidden");
    input.disabled = false;
    input.required = true;
  } else {
    bloco.classList.add("hidden");
    input.disabled = true;
    input.required = false;
    input.value = "";
  }
}

function coletarCamposVisiveis() {
  const dados = {};
  const campos = document.querySelectorAll("#formBaixa input, #formBaixa select, #formBaixa textarea");

  campos.forEach((campo) => {
    if (campo.disabled || !campo.name) return;
    dados[campo.name] = campo.value;
  });

  return dados;
}

document.getElementById("formaPagamento").addEventListener("change", toggleVencimentoBoleto);

document.getElementById("formBaixa").addEventListener("submit", async (event) => {
  event.preventDefault();

  const form = event.currentTarget;
  if (!form.reportValidity()) return;

  const msg = document.getElementById("msg");
  msg.className = "font-semibold text-blue-700";
  msg.innerText = "Salvando briefing...";

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/briefings`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        tipo: "baixa",
        empresa: document.getElementById("empresa").value,
        cpf_cnpj: document.getElementById("cpf_cnpj").value,
        grupo: document.getElementById("grupo").value || null,
        usuario_id: usuario.id,
        dados_json: coletarCamposVisiveis(),
        status: "Pendente"
      })
    });

    if (!response.ok) throw new Error("Falha ao salvar briefing");

    msg.className = "font-semibold text-green-700";
    msg.innerText = "Briefing salvo com sucesso! Redirecionando...";
    setTimeout(() => { window.location.href = "historico.html"; }, 1000);
  } catch (erro) {
    msg.className = "font-semibold text-red-700";
    msg.innerText = "Erro ao salvar briefing. Tente novamente.";
  }
});

toggleVencimentoBoleto();
</script>
</body>
</html>
