<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel - Orteconte</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU LATERAL -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3 font-bold">Dashboard</li>
      <li class="mb-3">
        <a href="novo.html" class="hover:text-gray-300">Novo Briefing</a>
      </li>
      <li class="mb-3">
        <a href="historico.html" class="hover:text-gray-300">Histórico</a>
      </li>
      <li class="mt-6">
        <button onclick="logout()" class="text-red-300 hover:text-red-400">
          Sair
        </button>
      </li>
    </ul>
  </div>

  <!-- CONTEÚDO -->
  <div class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-8">Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- TOTAL -->
      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500">Total de Briefings</p>
        <h2 id="total" class="text-3xl font-bold mt-2">0</h2>
      </div>

      <!-- ABERTURA -->
      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500">Abertura</p>
        <h2 id="abertura" class="text-3xl font-bold mt-2">0</h2>
      </div>

      <!-- ALTERAÇÃO -->
      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500">Alteração</p>
        <h2 id="alteracao" class="text-3xl font-bold mt-2">0</h2>
      </div>

      <!-- BAIXA -->
      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500">Baixa</p>
        <h2 id="baixa" class="text-3xl font-bold mt-2">0</h2>
      </div>

      <!-- PORTABILIDADE -->
      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500">Portabilidades</p>
        <h2 id="portabilidade" class="text-3xl font-bold mt-2">0</h2>
      </div>

    </div>

  </div>

</div>

<script src="js/config.js"></script>

<script>
  const usuario = JSON.parse(localStorage.getItem("usuario"));
  if (!usuario) {
    window.location.href = "index.html";
  }

  function logout() {
    localStorage.removeItem("usuario");
    window.location.href = "index.html";
  }

  async function carregarResumo() {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/briefings?select=*`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });

    const data = await response.json();

    let total = data.length;
    let abertura = 0;
    let alteracao = 0;
    let baixa = 0;
    let portabilidade = 0;

    data.forEach(item => {
      if (item.tipo === "Abertura") abertura++;
      else if (item.tipo === "Alteração") alteracao++;
      else if (item.tipo === "Baixa") baixa++;
      else portabilidade++;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("abertura").innerText = abertura;
    document.getElementById("alteracao").innerText = alteracao;
    document.getElementById("baixa").innerText = baixa;
    document.getElementById("portabilidade").innerText = portabilidade;
  }

  carregarResumo();
</script>

</body>
</html>
