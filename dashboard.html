<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Orteconte</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3 font-bold">
        <a href="dashboard.html">Dashboard</a>
      </li>
      <li class="mb-3">
        <a href="novo.html">Novo Briefing</a>
      </li>
      <li class="mb-3">
        <a href="historico.html">Histórico</a>
      </li>
      <li class="mt-6">
        <button onclick="logout()" class="text-red-300">
          Sair
        </button>
      </li>
    </ul>
  </div>

  <!-- CONTEÚDO -->
  <div class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-8">Dashboard</h1>

    <div class="bg-white p-6 rounded-xl shadow">
      <p>Total de Briefings: <strong id="total">0</strong></p>
    </div>

  </div>

</div>

<script src="js/config.js"></script>

<script>
const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario) {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("usuario");
  window.location.href = "index.html";
}

async function carregarResumo() {
  const response = await fetch(`${SUPABASE_URL}/rest/v1/briefings?select=*`, {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await response.json();
  document.getElementById("total").innerText = data.length;
}

carregarResumo();
</script>

</body>
</html>
