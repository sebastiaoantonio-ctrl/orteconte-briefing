<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel - Orteconte</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex">

  <!-- MENU LATERAL -->
  <div class="w-64 bg-blue-900 text-white min-h-screen p-5">
    <h2 class="text-xl font-bold mb-6">Orteconte</h2>
    <ul>
      <li class="mb-3 font-bold">Dashboard</li>
      <li class="mb-3"><a href="novo.html" class="hover:text-gray-300">Novo Briefing</a></li>
      <li class="mb-3"><a href="#" class="hover:text-gray-300">Histórico</a></li>
      <li class="mt-6">
        <button onclick="logout()" class="text-red-300 hover:text-red-400">
          Sair
        </button>
      </li>
    </ul>
  </div>

  <!-- CONTEÚDO -->
  <div class="flex-1 p-10">
    <h1 class="text-3xl font-bold mb-6">Dashboard</h1>

    <div class="bg-white p-6 rounded-xl shadow">
      <p>Total de Briefings: 
        <strong id="total">0</strong>
      </p>
    </div>
  </div>

</div>

<script src="js/config.js"></script>

<script>
  // Verifica login
  const usuario = JSON.parse(localStorage.getItem("usuario"));
  if (!usuario) {
    window.location.href = "index.html";
  }

  function logout() {
    localStorage.removeItem("usuario");
    window.location.href = "index.html";
  }

  async function carregarResumo() {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/briefings?select=*`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });

    const data = await response.json();
    document.getElementById("total").innerText = data.length;
  }

  carregarResumo();
</script>

</body>
</html>
